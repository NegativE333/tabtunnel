<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TabTunnel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0c0c0e;
      --tile:      #141416;
      --raised:    #1c1c1f;
      --rim:       rgba(255,255,255,0.08);
      --rim2:      rgba(255,255,255,0.13);
      --text:      #ededed;
      --muted:     #707070;
      --faint:     #333336;
      --green:     #3ddc84;
      --chip-bg:   rgba(255,255,255,0.06);
      --chip-on:   rgba(255,255,255,0.11);
    }

    html, body {
      width: 320px;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    /* ════════════════════════════════
       ENTRANCE
       Everything fades up 4px together,
       then the QR tile snaps forward.
    ════════════════════════════════ */
    @keyframes rise {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes tileSnap {
      0%   { opacity: 0; transform: scale(0.94) translateY(6px); filter: blur(6px); }
      60%  { opacity: 1; filter: blur(0); transform: scale(1.008) translateY(0); }
      100% { opacity: 1; filter: blur(0); transform: scale(1) translateY(0); }
    }
    @keyframes bracketIn {
      from { opacity: 0; transform: scale(0.85); }
      to   { opacity: 1; transform: scale(1); }
    }
    @keyframes pulse {
      0%,100% { opacity: 1; }
      50%     { opacity: 0.25; }
    }
    @keyframes shimmer {
      to { transform: translateX(200%); }
    }
    @keyframes reSnap {
      0%   { opacity: 0.15; transform: scale(0.96); filter: blur(5px); }
      100% { opacity: 1;    transform: scale(1);    filter: blur(0); }
    }

    .ui { animation: rise 0.22s cubic-bezier(0.22,1,0.36,1) both; }

    /* ════════════════════════════════
       HEADER
    ════════════════════════════════ */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 13px 14px 12px;
      border-bottom: 1px solid var(--rim);
    }

    .brand {
      display: flex; align-items: center; gap: 8px;
    }
    .brand-name {
      font-size: 13px; font-weight: 600;
      letter-spacing: -0.3px; color: var(--text);
    }
    .brand-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--green);
      animation: pulse 3s ease-in-out infinite;
      flex-shrink: 0;
    }

    /* Mode chips — sit right next to brand */
    .chips {
      display: flex; align-items: center;
      background: var(--chip-bg);
      border: 1px solid var(--rim);
      border-radius: 20px;
      padding: 3px;
      gap: 2px;
    }
    .chip {
      display: flex; align-items: center; gap: 4px;
      padding: 3px 9px;
      border-radius: 16px;
      font-size: 10.5px; font-weight: 500;
      color: var(--muted);
      cursor: pointer; border: none;
      background: none;
      transition: color 0.14s, background 0.14s;
      user-select: none; white-space: nowrap;
    }
    .chip svg { flex-shrink: 0; }
    .chip.active {
      background: var(--chip-on);
      color: var(--text);
    }
    .chip.dimmed {
      opacity: 0.35;
      cursor: not-allowed;
      pointer-events: none;
    }

    /* ════════════════════════════════
       TAB ROW
    ════════════════════════════════ */
    .tab-row {
      display: flex; align-items: center; gap: 7px;
      padding: 8px 14px;
      border-bottom: 1px solid var(--rim);
      min-height: 35px;
    }
    .fav {
      width: 12px; height: 12px; border-radius: 2px;
      flex-shrink: 0; object-fit: contain;
    }
    .fav-ph {
      width: 12px; height: 12px; border-radius: 2px;
      background: var(--faint); flex-shrink: 0;
    }
    .tab-name {
      font-size: 11px; color: var(--muted);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      flex: 1; min-width: 0; line-height: 1;
    }
    .tab-name b { color: var(--text); font-weight: 500; }

    /* ════════════════════════════════
       QR STAGE
    ════════════════════════════════ */
    .stage-wrap {
      padding: 18px 14px 14px;
      display: flex; flex-direction: column; align-items: center; gap: 12px;
    }

    .stage {
      position: relative;
      display: flex; align-items: center; justify-content: center;
    }

    /* Radial glow beneath QR */
    .stage::before {
      content: '';
      position: absolute;
      inset: -24px;
      background: radial-gradient(ellipse 80% 60% at 50% 50%,
        rgba(255,255,255,0.035) 0%,
        transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* The QR tile itself */
    .qr-tile {
      position: relative; z-index: 1;
      background: var(--tile);
      border-radius: 16px;
      padding: 11px;
      box-shadow:
        0 0 0 1px var(--rim2),
        0 0 0 1px rgba(255,255,255,0.03) inset,
        0 4px 6px rgba(0,0,0,0.4),
        0 12px 40px rgba(0,0,0,0.55);
      animation: tileSnap 0.38s cubic-bezier(0.22,1,0.36,1) 0.06s both;
    }
    .qr-tile.re-snap {
      animation: reSnap 0.22s cubic-bezier(0.22,1,0.36,1) both;
    }
    #qr-canvas-wrapper canvas { display: block; border-radius: 6px; }

    /* Skeleton */
    .skel {
      width: 192px; height: 192px; border-radius: 6px;
      background: var(--raised); overflow: hidden; position: relative;
    }
    .skel::after {
      content: ''; position: absolute;
      top: 0; left: -100%; width: 60%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.035), transparent);
      animation: shimmer 1.4s ease infinite;
    }

    /* Error */
    .qr-err {
      width: 192px; height: 192px; border-radius: 6px;
      background: var(--raised);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 8px; color: var(--muted); font-size: 11px; text-align: center; line-height: 1.6;
    }



     /* ════════════════════════════════
        HINT
     ════════════════════════════════ */
    .hint {
      font-size: 11px; color: var(--muted);
      display: flex; align-items: center; gap: 5px;
    }
    .hint svg { opacity: 0.45; flex-shrink: 0; }

    /* ════════════════════════════════
       BOTTOM BAR
    ════════════════════════════════ */
    .bottom {
      display: flex; align-items: center;
      background: var(--tile);
      border: 1px solid var(--rim);
      border-radius: 9px;
      padding: 7px 10px; gap: 8px;
      width: 100%;
    }
    .bottom-val {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px; color: var(--muted);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      flex: 1; min-width: 0;
    }
    .copy-btn {
      background: none; border: none; cursor: pointer;
      padding: 2px; color: var(--muted);
      display: flex; align-items: center;
      border-radius: 4px; flex-shrink: 0;
      transition: color 0.12s;
    }
    .copy-btn:hover  { color: var(--text); }
    .copy-btn.copied { color: var(--green); }

    /* ════════════════════════════════
       FOOTER
    ════════════════════════════════ */
    .footer {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 14px 12px;
      border-top: 1px solid var(--rim);
    }
    .copy-note {
      font-size: 9.5px; color: var(--faint);
      font-family: 'JetBrains Mono', monospace; letter-spacing: 0.02em;
    }
    .kbds { display: flex; align-items: center; gap: 3px; }
    kbd {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9.5px; font-weight: 500;
      color: var(--muted); background: var(--raised);
      border: 1px solid var(--rim2); border-bottom: 2px solid var(--rim2);
      border-radius: 4px; padding: 1px 5px; line-height: 16px;
      display: inline-flex; align-items: center;
    }
  </style>
</head>
<body>

<div class="ui">

  <!-- Header -->
  <div class="header">
    <div class="brand">
      <span class="brand-name">TabTunnel</span>
      <div class="brand-dot"></div>
    </div>

    <!-- Mode chips -->
    <div class="chips" id="chips">
      <button class="chip active" id="chip-url">
        <svg width="10" height="10" viewBox="0 0 14 14" fill="none">
          <path d="M5.5 8.5a3 3 0 0 0 4.2 0l1.6-1.6a3 3 0 0 0-4.2-4.2L6 3.8" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
          <path d="M8.5 5.5a3 3 0 0 0-4.2 0L2.7 7.1a3 3 0 0 0 4.2 4.2L8 10.2" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
        </svg>
        URL
      </button>
      <button class="chip dimmed" id="chip-text">
        <svg width="10" height="10" viewBox="0 0 14 14" fill="none">
          <path d="M1.5 3.5h11M1.5 7h7M1.5 10.5h5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
        </svg>
        Text
      </button>
    </div>
  </div>

  <!-- Tab row -->
  <div class="tab-row">
    <div id="fav-wrap"><div class="fav-ph"></div></div>
    <div class="tab-name" id="tab-name">Loading&hellip;</div>
  </div>

  <!-- QR stage -->
  <div class="stage-wrap">
    <div class="stage">

      <div class="qr-tile" id="qr-tile">
        <div id="qr-wrap"><div class="skel"></div></div>
      </div>
    </div>

    <!-- Hint -->
    <div class="hint">
      <svg width="11" height="11" viewBox="0 0 16 16" fill="none">
        <rect x="2" y="1" width="8" height="13" rx="2" stroke="currentColor" stroke-width="1.3"/>
        <path d="M4.5 11h3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
        <rect x="11.5" y="4" width="3" height="7" rx="1" stroke="currentColor" stroke-width="1.3"/>
      </svg>
      Point your phone camera at the code
    </div>

    <!-- Bottom bar -->
    <div class="bottom">
      <span class="bottom-val" id="bottom-val">—</span>
      <button class="copy-btn" id="copy-btn">
        <svg width="11" height="11" viewBox="0 0 16 16" fill="none">
          <rect x="5.5" y="5.5" width="8" height="8" rx="1.5" stroke="currentColor" stroke-width="1.3"/>
          <path d="M10.5 5.5V3.5a1.5 1.5 0 0 0-1.5-1.5h-5a1.5 1.5 0 0 0-1.5 1.5v5a1.5 1.5 0 0 0 1.5 1.5h2" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <span class="copy-note">© N3xt</span>
    <div class="kbds" id="kbds">
      <kbd>⌘</kbd><kbd>⇧</kbd><kbd>T</kbd>
    </div>
  </div>

</div>

<script src="qrcode.min.js"></script>
<script src="popup.js"></script>
</body>
</html>
